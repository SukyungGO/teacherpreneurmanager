/* localStorage 백업 */
const LS='tp_dash_v8';
function lsSave(){try{localStorage.setItem(LS,JSON.stringify({events,trash,cs,nEid,nCid}));}catch(e){}}
function lsLoad(){try{const r=localStorage.getItem(LS);return r?JSON.parse(r):null;}catch(e){return null;}}

/* Google Sheets 연동 */
async function sheetsLoad(){
  try{
    const r=await fetch(API_URL+'?t='+Date.now());
    const d=await r.json();
    return(d&&d.events&&d.events.length)?d:null;
  }catch(e){console.warn('[Sheets] load failed',e);return null;}
}
let _syncTimer=null;
async function sheetsSync(){
  setSyncStatus('syncing');
  try{
    await fetch(API_URL,{method:'POST',body:JSON.stringify({events,trash,cs,nEid,nCid}),mode:'no-cors'});
    setSyncStatus('saved');
  }catch(e){setSyncStatus('error');console.warn('[Sheets] save failed',e);}
}
function saveAll(){
  lsSave();
  clearTimeout(_syncTimer);
  setSyncStatus('syncing');
  _syncTimer=setTimeout(sheetsSync,800);
}

let trash=[],cs={},openId=null,af='전체',showF=false,acOpen={},editingId=null,editingCl=null;

let nEid=100,nCid={};

function initState(saved){
  if(saved&&saved.events&&saved.events.length){
    events=saved.events;trash=saved.trash||[];cs=saved.cs||{};
    nEid=saved.nEid||100;nCid=saved.nCid||{};
  }
  events.forEach(e=>{
    if(!cs[e.id])cs[e.id]={};
    e.cl.forEach(c=>{if(cs[e.id][c.id]===undefined)cs[e.id][c.id]=false;});
    if(!nCid[e.id])nCid[e.id]=e.cl.length?Math.max(...e.cl.map(c=>c.id))+1:1;
  });
}

/* 유틸 */
function gd(s){return Math.round((new Date(s)-TODAY)/86400000);}
function fmt(s,e){const a=new Date(s),b=new Date(e),s1=`${a.getMonth()+1}/${a.getDate()}`,e1=`${b.getMonth()+1}/${b.getDate()}`;return s1===e1?s1:`${s1}~${e1}`;}
function fmtNow(){const n=new Date();return`${n.getMonth()+1}/${n.getDate()} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;}
function todayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function dd(e){const d=gd(e.start),de=gd(e.end);if(de<0)return{l:'완료',c:'dx'};if(d<=0&&de>=0)return{l:'진행중',c:'dg'};if(d<=7)return{l:`D-${d}`,c:'dr'};if(d<=30)return{l:`D-${d}`,c:'do'};return{l:`D-${d}`,c:'db'};}
function pg(id){const v=Object.values(cs[id]||{});return v.length?Math.round(v.filter(Boolean).length/v.length*100):0;}
function dc(id){return Object.values(cs[id]||{}).filter(Boolean).length;}

/* 요약 */
function rSmry(){
  const act=events.filter(e=>gd(e.end)>=0);
  const urg=act.filter(e=>{const d=gd(e.start),de=gd(e.end);return(d<=0&&de>=0)||d<=7;});
  const tCL=events.reduce((a,e)=>a+e.cl.length,0);
  const dCL=events.reduce((a,e)=>a+dc(e.id),0);
  const ip=act.filter(e=>{const v=Object.values(cs[e.id]||{});return v.some(Boolean)&&!v.every(Boolean);});
  document.getElementById('smry').innerHTML=`
    <div class="sc"><div class="sc-l">남은 일정</div><div class="sc-v">${act.length}</div></div>
    <div class="sc"><div class="sc-l" style="color:#A32D2D">즉시 조치 필요</div><div class="sc-v" style="color:#A32D2D">${urg.length}</div></div>
    <div class="sc"><div class="sc-l">체크리스트 완료</div><div class="sc-v">${dCL}<sub>/${tCL}</sub></div></div>
    <div class="sc"><div class="sc-l">준비 진행중</div><div class="sc-v">${ip.length}</div></div>`;}

/* 탭 네비 */
function rTabNav(){
  const urgCnt=events.filter(e=>{const d=gd(e.start),de=gd(e.end);return de>=0&&((d<=0&&de>=0)||d<=7);}).length;

      <div class="arw${isO?' op':''}">${ARW}</div>
    </div>
    ${isDC?`<div class="conf-bar">"${e.title.length>22?e.title.slice(0,22)+'…':e.title}"을 휴지통으로 이동할까요?<div class="del-bar-btns" style="margin-left:auto"><button class="dbyes" onclick="doEvt('${e.id}')">이동</button><button class="dbno" onclick="delConf=null;rSchedule()">취소</button></div></div>`:''}
    <div class="cl-wrap${isO?' op':''}">
      <div class="cl-inner">${tct===0&&!isAO?'<div style="font-size:13px;color:var(--color-text-tertiary);padding:4px 0 2px">체크리스트 항목이 없습니다</div>':''}${rows}${addBar}</div>
    </div>
  </div>`;}

function secBlock(type,label,items){
  if(!items.length)return'';
  const cls=type==='urg'?'urg-block':type==='soon'?'soon-block':'come-block';
  return`<div class="sec-block ${cls}">
    <div class="sec-head"><span class="sec-dot"></span><span class="sec-label">${label}</span><span class="sec-cnt">${items.length}</span></div>
    <div class="sec-body">${items.map(cardH).join('')}</div>
  </div>`;}

function rSchedule(){
  const today=todayStr();
  const cats=['전체','정기기수','동문프로그램','단기워크숍','품결의'];
  const cnt=c=>c==='전체'?events.filter(e=>gd(e.end)>=0).length:events.filter(e=>e.cat===c&&gd(e.end)>=0).length;
  const ftrs=`<div class="topbar">
    <div style="display:flex;gap:6px;flex-wrap:wrap">${cats.map(c=>`<span class="ftag${af===c?' on':''}" onclick="sf('${c}')">${c}<span class="fcnt">${cnt(c)}</span></span>`).join('')}</div>
    <button class="add-evt" onclick="tForm()">${P}&nbsp;&nbsp;일정 추가</button>
  </div>`;
  const editingEvent=editingId?events.find(e=>e.id===editingId):null;
const fw=showF?`<div class="add-form"><div class="form-h">${editingEvent?'일정 수정':'새 일정 추가'}</div>
  <div class="fgrid">
    <div class="fg">
      <label class="fl">일정 제목</label>
      <input class="fi" id="fi-t" placeholder="제목을 입력하세요" value="${editingEvent?editingEvent.title:''}">
    </div>
    <div class="fg">
      <label class="fl">카테고리</label>
      <select class="fsel" id="fi-c">
        <option ${editingEvent?.cat==='정기기수'?'selected':''}>정기기수</option>
        <option ${editingEvent?.cat==='동문프로그램'?'selected':''}>동문프로그램</option>
        <option ${editingEvent?.cat==='단기워크숍'?'selected':''}>단기워크숍</option>
        <option ${editingEvent?.cat==='품결의'?'selected':''}>품결의</option>
      </select>
    </div>
  </div>
  <div class="fgrid2">
    <div class="fg">
      <label class="fl">시작일</label>
      <input class="fi" id="fi-s" type="date" value="${editingEvent?editingEvent.start:today}">
    </div>
    <div class="fg">
      <label class="fl">종료일</label>
      <input class="fi" id="fi-e" type="date" value="${editingEvent?editingEvent.end:today}">
    </div>
  </div>
  <div class="fbtns">
    <button class="bcx" onclick="tForm()">취소</button>
    <button class="bok" onclick="subE()">${editingEvent?'수정 저장':'추가하기'}</button>
  </div>
</div>`:'';
  const f=af==='전체'?events:events.filter(e=>e.cat===af);
  const urg=f.filter(e=>{const d=gd(e.start),de=gd(e.end);return de>=0&&((d<=0&&de>=0)||d<=7);});
  const soon=f.filter(e=>{const d=gd(e.start);return gd(e.end)>=0&&d>7&&d<=30;});
  const come=f.filter(e=>{const d=gd(e.start);return gd(e.end)>=0&&d>30;});
  const body=!urg.length&&!soon.length&&!come.length
    ?`<div class="empty">해당 카테고리의 일정이 없습니다</div>`
    :secBlock('urg','지금 조치 필요',urg)+secBlock('soon','이달 내 준비',soon)+secBlock('come','예정',come);
  document.getElementById('main-content').innerHTML=ftrs+fw+body;
  if(showF)setTimeout(()=>document.getElementById('fi-t')?.focus(),30);}

function trashCardH(e){
  const isPDC=pdelConf===e.id;
  return`<div class="ecard">
    <div class="ehead" style="cursor:default">
      <span class="dday dx">${fmt(e.start,e.end)}</span>
      <div class="etxt">
        <div class="etitle" style="color:var(--color-text-secondary)">${e.title}</div>
        <div style="font-size:11px;color:var(--color-text-tertiary);margin-top:3px">삭제됨: ${e.deletedAt} · 체크리스트 ${e.cl.length}개</div>
      </div>
      <div class="emeta"><span class="cbadge c${e.cat}">${e.cat}</span></div>
      <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
        <button class="restore-btn" onclick="restoreEvt('${e.id}')">${RES}&nbsp;복원</button>
        <button class="pdel-btn" onclick="pdelConf='${e.id}';rTrash()" title="영구 삭제">${T}</button>
      </div>
    </div>
    ${isPDC?`<div class="conf-bar">"${e.title.length>22?e.title.slice(0,22)+'…':e.title}"을 영구 삭제할까요?<div class="del-bar-btns" style="margin-left:auto"><button class="dbyes" onclick="permDel('${e.id}')">영구 삭제</button><button class="dbno" onclick="pdelConf=null;rTrash()">취소</button></div></div>`:''}
  </div>`;}

function rTrash(){
  const caBtn=clearAllConf
    ?`<div class="conf-bar" style="margin-bottom:10px;border-radius:var(--border-radius-md)">휴지통을 모두 비울까요? 복원할 수 없습니다.<div class="del-bar-btns" style="margin-left:auto"><button class="dbyes" onclick="clearAll()">모두 삭제</button><button class="dbno" onclick="clearAllConf=false;rTrash()">취소</button></div></div>`
    :trash.length>0?`<div style="display:flex;align-items:center;margin-bottom:10px"><span style="font-size:12px;color:var(--color-text-tertiary)">${trash.length}개 항목</span><button class="clear-all" onclick="clearAllConf=true;rTrash()">휴지통 비우기</button></div>`:'';
  const body=trash.length===0
    ?`<div class="trash-empty"><div class="trash-empty-icon"><svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 12h26"/><path d="M16 12V9h8v3"/><path d="M9 12l2 20h18l2-20"/><path d="M16 18v8"/><path d="M24 18v8"/></svg></div>
      <div class="trash-empty-t">휴지통이 비어 있습니다</div>
      <div class="trash-empty-s">삭제한 일정이 여기에 보관됩니다</div></div>`
    :trash.map(trashCardH).join('');
  document.getElementById('main-content').innerHTML=caBtn+body;}

function render(){saveAll();rSmry();rTabNav();activeTab==='schedule'?rSchedule():rTrash();}

window.setTab=t=>{activeTab=t;delConf=null;delClConf=null;pdelConf=null;clearAllConf=false;render();};
window.sf=c=>{af=c;rSchedule();};
window.tog=id=>{openId=openId===id?null:id;delClConf=null;rSchedule();};
window.tForm=()=>{   if(showF){     showF=false;     editingId=null;   }else{     showF=true;   }   rSchedule(); };
  window.editEvt=id=>{
  editingId=id;
  showF=true;
  delConf=null;
  rSchedule();
  setTimeout(()=>{
    document.getElementById('fi-t')?.focus();
    document.getElementById('fi-t')?.scrollIntoView({behavior:'smooth',block:'center'});
  },50);
};
window.tAC=id=>{acOpen[id]=!acOpen[id];rSchedule();if(acOpen[id])setTimeout(()=>document.getElementById('clt-'+id)?.focus(),30);};
window.ck=(eid,cid,val)=>{cs[eid][cid]=val;saveAll();rSmry();rSchedule();};
window.doEvt=id=>{
  const ev=events.find(e=>e.id===id);if(!ev)return;
  ev.deletedAt=fmtNow();trash.unshift({...ev});
  events=events.filter(e=>e.id!==id);
  if(openId===id)openId=null;delete acOpen[id];delConf=null;render();};
window.doCl=(eid,cid)=>{
  const ev=events.find(e=>e.id===eid);if(ev)ev.cl=ev.cl.filter(c=>c.id!==cid);
  delete cs[eid][cid];delClConf=null;saveAll();rSmry();rSchedule();};
window.restoreEvt=id=>{
  const ev=trash.find(e=>e.id===id);if(!ev)return;
  delete ev.deletedAt;events.push(ev);
  if(!cs[id]){cs[id]={};ev.cl.forEach(c=>{cs[id][c.id]=false;});}
  trash=trash.filter(e=>e.id!==id);pdelConf=null;render();};
window.permDel=id=>{trash=trash.filter(e=>e.id!==id);pdelConf=null;saveAll();rTrash();rTabNav();};
window.clearAll=()=>{trash=[];clearAllConf=false;render();};
window.subE=()=>{
  const t=document.getElementById('fi-t')?.value.trim();
  const c=document.getElementById('fi-c')?.value;
  const s=document.getElementById('fi-s')?.value;
  const e=document.getElementById('fi-e')?.value||s;
  if(!t||!s)return;

  if(editingId){
    const ev=events.find(x=>x.id===editingId);
    if(!ev)return;
    ev.title=t;
    ev.cat=c;
    ev.start=s;
    ev.end=e;
    showF=false;
    editingId=null;
    render();
    return;
  }

  const id='ev'+nEid++;
  events.push({id,cat:c,title:t,start:s,end:e,cl:[]});
  cs[id]={};
  nCid[id]=1;
  showF=false;
  editingId=null;
  render();
};
window.sCl=eid=>{
  const t=document.getElementById('clt-'+eid)?.value.trim();
  const w=document.getElementById('clw-'+eid)?.value.trim()||'-';
  if(!t)return;
  const ev=events.find(e=>e.id===eid);if(!ev)return;
  const id=nCid[eid]++;
  ev.cl.push({id,t,w});cs[eid][id]=false;
  acOpen[eid]=false;saveAll();rSmry();rSchedule();};

window.editCl=(eid,cid)=>{
  editingCl=`${eid}:${cid}`;
  delClConf=null;
  rSchedule();
  setTimeout(()=>{
    document.getElementById(`edit-clt-${eid}-${cid}`)?.focus();
  },30);
};

window.cancelClEdit=()=>{
  editingCl=null;
  rSchedule();
};

window.saveClEdit=(eid,cid)=>{
  const t=document.getElementById(`edit-clt-${eid}-${cid}`)?.value.trim();
  const w=document.getElementById(`edit-clw-${eid}-${cid}`)?.value.trim() || '-';
  if(!t)return;

  const ev=events.find(e=>e.id===eid);
  if(!ev)return;

  const item=ev.cl.find(x=>x.id===cid);
  if(!item)return;

  item.t=t;
  item.w=w;
  editingCl=null;
  saveAll();
  rSchedule();
};

/* 초기 로드: Sheets 우선 → localStorage 폴백 */
(async()=>{
  setSyncStatus('loading');
  const fromSheets=await sheetsLoad();
  if(fromSheets){
    initState(fromSheets);
    setSyncStatus('loaded');
  }else{
    const fromLocal=lsLoad();
    initState(fromLocal||{});
    setSyncStatus('local');
  }
  render();
})();
</script>
